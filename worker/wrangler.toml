# 玄机阁轻后端 —— 部署：npx wrangler deploy（详见 worker/README.md）
name = "xuanjige-api"
main = "src/index.js"
compatibility_date = "2026-01-01"

# 云同步存储：先执行 `npx wrangler kv namespace create SYNC_KV`
# 把命令输出的 id 填到下面（不填则 /sync 返回 500，AI 代理不受影响）
[[kv_namespaces]]
binding = "SYNC_KV"
id = "e2055f5e97db45aaa72b14afaba890ae"

[vars]
# 主上游 OpenAI 兼容接口（不含 /chat/completions）
UPSTREAM_BASE = "https://api.hao.ai/v1"
# 固定使用的模型（前端填什么都以这里为准）
UPSTREAM_MODEL = "claude-sonnet-5"
# 备用上游：主上游失败/超时自动切换（密钥另用 secret：UPSTREAM2_KEY）
UPSTREAM2_BASE = "https://api.apilio.ai/v1"
UPSTREAM2_MODEL = "claude-sonnet-5"
# 允许的网页来源；上线后建议收紧为 "https://joserin1991.github.io"
ALLOW_ORIGIN = "*"
# 零配置访问白名单（Origin 精确匹配，逗号分隔；localhost 恒放行方便开发）
PUBLIC_ORIGINS = "https://joserin1991.github.io"
# 零配置访问每日限额（特权口令不受限）
DAILY_LIMIT = "300"
IP_DAILY_LIMIT = "60"

# 机密另行设置，绝不写进本文件：
#   npx wrangler secret put UPSTREAM_KEY   ← 上游 API 密钥
#   npx wrangler secret put ACCESS_CODE    ← 自定访问口令（可选但强烈建议）
